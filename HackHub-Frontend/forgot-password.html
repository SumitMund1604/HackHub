<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>HackHub - Forgot Password</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="navbar">
    <a href="index.html" class="logo">🚀 HackHub</a>
    <div class="nav-links">
        <a href="login.html">Login</a>
        <a href="register.html">Register</a>
    </div>
</div>

<div class="auth-wrapper">
    <h2>🔑 Forgot Password</h2>
    <p style="text-align:center; color:#888; margin-bottom:20px; font-size:14px;">
        Enter your email and we'll send you a reset link.
    </p>
    <form onsubmit="event.preventDefault(); showAlert('Reset link sent to your email!','success');">
        <div class="form-group">
            <label>Email Address</label>
            <input type="email" placeholder="Enter your registered email">
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%; padding:12px;">Send Reset Link</button>
    </form>
    <div class="link-text">
        <a href="login.html">← Back to Login</a>
    </div>
</div>

<div class="footer">&copy; 2026 HackHub | IWT Lab Project</div>
<script src="script.js"></script>
</body>
</html>
