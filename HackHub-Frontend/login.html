<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>HackHub - Login</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="navbar">
    <a href="index.html" class="logo">🚀 HackHub</a>
    <div class="nav-links">
        <a href="hackathons.html">Hackathons</a>
        <a href="register.html">Register</a>
    </div>
</div>

<div class="auth-wrapper">
    <h2>🔐 Login to HackHub</h2>
    <form onsubmit="handleLogin(event)">
        <div class="form-group">
            <label>Email Address</label>
            <input type="email" id="email" placeholder="Enter your email">
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="Enter your password">
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%; padding:12px;">Login</button>
    </form>
    <div class="link-text">
        Don't have an account? <a href="register.html">Register here</a>
    </div>
    <div class="link-text">
        <a href="forgot-password.html">Forgot Password?</a>
    </div>
</div>

<div class="footer">&copy; 2026 HackHub | IWT Lab Project</div>

<script src="script.js"></script>
</body>
</html>
