<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>HackHub - Register</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="navbar">
    <a href="index.html" class="logo">🚀 HackHub</a>
    <div class="nav-links">
        <a href="hackathons.html">Hackathons</a>
        <a href="login.html">Login</a>
    </div>
</div>

<div class="auth-wrapper" style="max-width:500px;">
    <h2>📝 Create Account</h2>
    <form onsubmit="handleRegister(event)">
        <div class="form-group">
            <label>Full Name</label>
            <input type="text" id="fullname" placeholder="Enter your full name">
        </div>
        <div class="form-group">
            <label>Username</label>
            <input type="text" id="username" placeholder="Choose a username">
        </div>
        <div class="form-group">
            <label>Email Address</label>
            <input type="email" id="email" placeholder="Enter your email">
        </div>
        <div class="form-group">
            <label>College</label>
            <input type="text" id="college" placeholder="Your college name">
        </div>
        <div class="form-group">
            <label>Department</label>
            <select id="department">
                <option value="">-- Select Department --</option>
                <option value="Computer Science">Computer Science</option>
                <option value="Information Technology">Information Technology</option>
                <option value="Electronics">Electronics</option>
                <option value="Mechanical">Mechanical</option>
                <option value="Civil">Civil</option>
                <option value="Other">Other</option>
            </select>
        </div>
        <div class="form-group">
            <label>Year of Study</label>
            <select id="year">
                <option value="">-- Select Year --</option>
                <option value="1">1st Year</option>
                <option value="2">2nd Year</option>
                <option value="3">3rd Year</option>
                <option value="4">4th Year</option>
            </select>
        </div>
        <div class="form-group">
            <label>Role</label>
            <select id="role">
                <option value="student">Student</option>
                <option value="organizer">Organizer</option>
                <option value="mentor">Mentor</option>
            </select>
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="Create a password">
        </div>
        <div class="form-group">
            <label>Confirm Password</label>
            <input type="password" id="confirm-password" placeholder="Confirm your password">
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%; padding:12px;">Register</button>
    </form>
    <div class="link-text">
        Already have an account? <a href="login.html">Login here</a>
    </div>
</div>

<div class="footer">&copy; 2026 HackHub | IWT Lab Project</div>

<script src="script.js"></script>
</body>
</html>
