<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>HackHub - My Profile</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="navbar">
    <a href="index.html" class="logo">🚀 HackHub</a>
    <div class="nav-links">
        <a href="dashboard.html">Dashboard</a>
        <a href="hackathons.html">Hackathons</a>
        <a href="find-teammates.html">Teams</a>
        <a href="inbox.html">Messages</a>
        <a href="#" onclick="logout()">Logout</a>
    </div>
</div>
<div class="container" style="max-width:750px;">
    <h2 class="page-title">👤 My Profile</h2>

    <div class="card">
        <div class="profile-header">
            <div class="avatar" id="profile-avatar">?</div>
            <div>
                <h3 style="margin-bottom:4px;" id="profile-name">Loading...</h3>
                <p style="color:#888;" id="profile-username">@...</p>
                <p id="profile-info">📍 Loading...</p>
                <p id="profile-points">🏆 Loading...</p>
                <p style="margin-top:5px;" id="profile-role-badge">
                    <span class="badge badge-blue">...</span>
                </p>
            </div>
        </div>
        <hr>
        <p id="profile-bio"><strong>Bio:</strong> Loading...</p>
        <p class="mt10" id="profile-links">
            🔗 <a href="#" id="profile-github" target="_blank" style="color:#3498db;">GitHub</a> &nbsp;|&nbsp;
            🔗 <a href="#" id="profile-linkedin" target="_blank" style="color:#3498db;">LinkedIn</a> &nbsp;|&nbsp;
            🔗 <a href="#" id="profile-portfolio" target="_blank" style="color:#3498db;">Portfolio</a>
        </p>
    </div>

    <div class="card">
        <h3>🛠️ Skills</h3>
        <table>
            <thead>
                <tr><th>Skill</th><th>Category</th><th>Proficiency</th></tr>
            </thead>
            <tbody id="profile-skills">
                <tr><td colspan="3" style="text-align:center; color:#888;">Loading skills...</td></tr>
            </tbody>
        </table>
        <div style="margin-top:12px;">
            <button class="btn btn-success" onclick="document.getElementById('add-skill-form').style.display = document.getElementById('add-skill-form').style.display === 'none' ? 'block' : 'none'">+ Add Skill</button>
            <div id="add-skill-form" style="display:none; margin-top:10px; padding:12px; background:#f9f9f9; border-radius:6px;">
                <div class="form-group">
                    <label>Skill Name</label>
                    <input type="text" id="new-skill-name" placeholder="e.g. Python, React, Docker">
                </div>
                <div class="form-group">
                    <label>Category</label>
                    <select id="new-skill-category">
                        <option value="language">Language</option>
                        <option value="framework">Framework</option>
                        <option value="tool">Tool</option>
                        <option value="other">Other</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Proficiency</label>
                    <select id="new-skill-proficiency">
                        <option value="beginner">Beginner</option>
                        <option value="intermediate" selected>Intermediate</option>
                        <option value="advanced">Advanced</option>
                        <option value="expert">Expert</option>
                    </select>
                </div>
                <button class="btn btn-primary" onclick="handleAddSkill()">Save Skill</button>
            </div>
        </div>
    </div>

    <div style="margin-top:15px;">
        <a href="edit-profile.html" class="btn btn-primary">✏️ Edit Profile</a>
        <a href="inbox.html" class="btn btn-success" style="margin-left:8px;">💬 Messages</a>
    </div>
</div>
<div class="footer">&copy; 2026 HackHub | IWT Lab Project</div>
<script src="script.js"></script>
</body>
</html>
