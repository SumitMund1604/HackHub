<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>HackHub - Edit Profile</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="navbar">
    <a href="index.html" class="logo">🚀 HackHub</a>
    <div class="nav-links">
        <a href="dashboard.html">Dashboard</a>
        <a href="profile.html">Profile</a>
        <a href="#" onclick="logout()">Logout</a>
    </div>
</div>
<div class="container" style="max-width:600px;">
    <a href="profile.html" style="color:#3498db; text-decoration:none;">← Back to Profile</a>
    <h2 class="page-title mt10">✏️ Edit Profile</h2>
    <div class="card">
        <form onsubmit="handleEditProfile(event)">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="edit-fullname" placeholder="Enter your full name">
            </div>
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="edit-username" placeholder="Enter username">
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="edit-email" disabled placeholder="Email (cannot be changed)">
            </div>
            <div class="form-group">
                <label>College</label>
                <input type="text" id="edit-college" placeholder="Your college name">
            </div>
            <div class="form-group">
                <label>Department</label>
                <select id="edit-department">
                    <option value="">-- Select Department --</option>
                    <option value="Computer Science">Computer Science</option>
                    <option value="Information Technology">Information Technology</option>
                    <option value="Electronics">Electronics</option>
                    <option value="Mechanical">Mechanical</option>
                    <option value="Civil">Civil</option>
                    <option value="Other">Other</option>
                </select>
            </div>
            <div class="form-group">
                <label>Year of Study</label>
                <select id="edit-year">
                    <option value="">-- Select Year --</option>
                    <option value="1">1st Year</option>
                    <option value="2">2nd Year</option>
                    <option value="3">3rd Year</option>
                    <option value="4">4th Year</option>
                </select>
            </div>
            <div class="form-group">
                <label>Bio</label>
                <textarea id="edit-bio" placeholder="Tell us about yourself..."></textarea>
            </div>
            <div class="form-group">
                <label>GitHub URL</label>
                <input type="url" id="edit-github" placeholder="https://github.com/yourusername">
            </div>
            <div class="form-group">
                <label>LinkedIn URL</label>
                <input type="url" id="edit-linkedin" placeholder="https://linkedin.com/in/yourusername">
            </div>
            <div class="form-group">
                <label>Portfolio URL</label>
                <input type="url" id="edit-portfolio" placeholder="https://your-portfolio.com">
            </div>
            <button type="submit" class="btn btn-primary" style="padding:12px 30px;">💾 Save Changes</button>
            <a href="profile.html" class="btn btn-danger" style="margin-left:8px; padding:12px 30px;">Cancel</a>
        </form>
    </div>
</div>
<div class="footer">&copy; 2026 HackHub | IWT Lab Project</div>
<script src="script.js"></script>
</body>
</html>
